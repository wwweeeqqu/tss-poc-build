name: Deploy dungeon-web to GitHub Pages

on:
  push:
    branches:
      - claude/upbeat-maxwell-MUZJm
  workflow_dispatch:

# 需要写权限把构建产物推到 gh-pages 分支
permissions:
  contents: write

concurrency:
  group: pages-ghbranch
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dungeon-web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: dungeon-web

      - name: Build
        run: npm run build
        working-directory: dungeon-web

      - name: Publish dist to gh-pages branch
        run: |
          cd dungeon-web/dist
          touch .nojekyll            # 关闭 Jekyll，避免忽略以 _ 开头的资源
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -q -b gh-pages
          git add -A
          git commit -q -m "Deploy ${GITHUB_SHA}"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
